<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&family=Jura:wght@300;500&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    * { margin: 0; }

    :root {
      --m-primary: oklch(0.480 0.190 150);
      --m-primary-hover: oklch(0.420 0.180 150);
      --m-primary-ghost: oklch(0.480 0.190 150 / 0.05);
      --m-bg: #f8f9f8;
      --m-bg-card: #ffffff;
      --m-border: oklch(0.750 0.015 150 / 0.6);
      --m-border-subtle: oklch(0.820 0.010 150 / 0.5);
      --m-text: #1a2420;
      --m-text-secondary: oklch(0.420 0.020 150);
      --m-text-dim: oklch(0.550 0.015 150);
      --m-shadow-sm: 0 1px 3px oklch(0.480 0.050 150 / 0.06);
      --m-shadow-md: 0 4px 16px oklch(0.480 0.050 150 / 0.06), 0 1px 4px oklch(0 0 0 / 0.03);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --m-primary: oklch(0.550 0.180 150);
        --m-bg: #0e1210;
        --m-bg-card: #161b18;
        --m-border: oklch(0.350 0.020 150 / 0.6);
        --m-border-subtle: oklch(0.280 0.015 150 / 0.5);
        --m-text: #e0e5e2;
        --m-text-secondary: oklch(0.650 0.015 150);
        --m-text-dim: oklch(0.500 0.010 150);
        --m-shadow-sm: 0 1px 3px oklch(0 0 0 / 0.2);
        --m-shadow-md: 0 4px 16px oklch(0 0 0 / 0.3), 0 1px 4px oklch(0 0 0 / 0.15);
      }
    }

    body {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      background: var(--m-bg);
      color: var(--m-text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .error-container {
      text-align: center;
      max-width: 480px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      margin-bottom: 3rem;
    }

    .logo-mark { height: 32px; width: auto; }

    .logo-text {
      font-family: 'Jura', system-ui, sans-serif;
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: var(--m-text);
    }

    .logo-text span {
      font-weight: 500;
      color: var(--m-primary);
    }

    .error-code {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--m-primary);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }

    .error-code::before,
    .error-code::after {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--m-primary);
    }

    .error-title {
      font-family: 'Jura', system-ui, sans-serif;
      font-weight: 300;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 1rem;
      color: var(--m-text);
    }

    .error-description {
      font-size: 1rem;
      color: var(--m-text-secondary);
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .error-action {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0.75rem 1.75rem;
      background: transparent;
      color: var(--m-text-secondary);
      border: 1px solid var(--m-border);
      border-radius: 6px;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .error-action:hover {
      border-color: var(--m-primary);
      color: var(--m-primary);
      background: var(--m-primary-ghost);
    }

    .footer-line {
      position: fixed;
      bottom: 2rem;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 0.65rem;
      letter-spacing: 1px;
      color: var(--m-text-dim);
    }
  </style>
</head>
<body>

  <div class="error-container">
    <a href="/" class="logo">
      <svg class="logo-mark" viewBox="0 0 52 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="16" y="2" width="32" height="38" rx="7" fill="oklch(0.600 0.190 150)" opacity="0.15"/>
        <rect x="8" y="10" width="32" height="38" rx="7" fill="oklch(0.600 0.190 150)" opacity="0.40"/>
        <rect x="0" y="18" width="32" height="38" rx="7" fill="oklch(0.600 0.190 150)"/>
      </svg>
      <span class="logo-text">recuerd<span>0</span></span>
    </a>

    <div class="error-code">406 · not acceptable</div>
    <h1 class="error-title">Browser not supported</h1>
    <p class="error-description">
      Your browser doesn't support the features this application requires. Please upgrade to a modern browser to continue.
    </p>
    <a href="/" class="error-action">← Try again</a>
  </div>

  <div class="footer-line">recuerd0 · 2026</div>

</body>
</html>
