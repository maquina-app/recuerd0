completed_export:
  account: one
  user: one
  status: completed
  completed_at: <%= 2.days.ago.iso8601 %>
  expires_at: <%= 3.days.from_now.iso8601 %>

expired_export:
  account: one
  user: one
  status: completed
  completed_at: <%= 10.days.ago.iso8601 %>
  expires_at: <%= 2.days.ago.iso8601 %>

pending_export:
  account: one
  user: one
  status: pending

failed_export:
  account: one
  user: one
  status: failed
  error_message: "Something went wrong"
  created_at: <%= 2.days.ago.iso8601 %>
